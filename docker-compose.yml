services:
  aa-bot:
    build: .
    image: aa-bot
    container_name: aa-bot
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 5000
    volumes:
      - ./data:/usr/src/app/data
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:' + (process.env.PORT || 5000) + '/api/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: always
